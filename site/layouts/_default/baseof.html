<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "en-us" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
</head>
<body>

  <header class="nav-header">
    <div class="nav-container">
      <a href="{{ site.Home.RelPermalink }}" class="site-logo">BIOS Archive</a>
      {{ if not .IsHome }}
      <nav>
        <ul class="nav-menu">
          <li><a href="{{ site.Home.RelPermalink }}" class="nav-link">Home</a></li>
          <li><a href="{{ "mrbios/" | relURL }}" class="nav-link">MR BIOS</a></li>
          <li><a href="{{ "unicore/" | relURL }}" class="nav-link">Unicore Award</a></li>
        </ul>
      </nav>
      {{ end }}
    </div>
  </header>

  <main class="main-container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="https://github.com/{{ .Site.Params.githubRepo }}" target="_blank">GitHub</a>
    </div>
  </footer>

</body>
</html>
