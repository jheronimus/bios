name: Process BIOS Imports

on:
  push:
    paths:
      - 'import/**/*.bin'
      - 'import/**/*.BIN'
      - 'import/**/*.rom'
      - 'import/**/*.ROM'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Import Parser
        run: python scripts/parse_import.py

      - name: Commit and push new.yml
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add import/new.yml
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-generate import/new.yml [skip ci]"
            git push
          else
            echo "No changes in new.yml"
          fi
